# Lutris installer for Minecraft Bedrock Edition via GDK-Proton
#
# Prerequisites:
#   - Minecraft Bedrock game files extracted from Windows (see README Parts 1-3)
#   - The extracted directory must contain Minecraft.Windows.exe
#
# Usage:
#   lutris -i lutris-installer.yaml
#
# What this installer does:
#   1. Copies game files to the Lutris game directory
#   2. Downloads and installs the GDK-Proton runner
#   3. Replaces XCurl.dll with mingw curl (for network/marketplace)
#   4. Copies XCurl dependency DLLs from GDK-Proton
#   5. Downloads SSL CA certificates
#   6. Copies xgameruntime DLLs from GDK-Proton
#   7. Creates Wine prefix and installs GameInputRedist
#   8. Generates a launch script that invokes GDK-Proton directly
#      (with WINEDLLOVERRIDES="GameInputRedist=b" to use builtin DLL)
#
# To update versions, change all references below:
#   GDK-Proton: https://github.com/Weather-OS/GDK-Proton/releases
#   mingw curl: https://repo.msys2.org/mingw/mingw64/ (search mingw-w64-x86_64-curl)

name: Minecraft Bedrock Edition
game_slug: minecraft-bedrock-edition
version: "GDK-Proton10 (game files from Windows)"
slug: minecraft-bedrock-edition-gdk-proton
runner: linux

script:
  require-binaries: curl, zstd, tar

  files:
  - game_exe: "N/A:Select any file inside your extracted Minecraft Bedrock game directory"

  installer:
    # Copy game files into install directory
    - execute:
        command: >-
          mkdir -p "$GAMEDIR/game" &&
          GAME_SRC="$(dirname "$game_exe")" &&
          cp -a "$GAME_SRC"/. "$GAMEDIR/game/"

    # Download and extract GDK-Proton
    - execute:
        command: >-
          if [ ! -d "$GAMEDIR/GDK-Proton10-32" ]; then
          curl -sL "https://github.com/Weather-OS/GDK-Proton/releases/download/release10-32/GDK-Proton10-32.tar.gz"
          | tar xz -C "$GAMEDIR";
          fi

    # Replace XCurl.dll with mingw curl (enables network/marketplace)
    - execute:
        command: >-
          WORK=$(mktemp -d) &&
          cd "$WORK" &&
          curl -sLO "https://repo.msys2.org/mingw/mingw64/mingw-w64-x86_64-curl-8.12.1-1-any.pkg.tar.zst" &&
          zstd -d mingw-w64-x86_64-curl-8.12.1-1-any.pkg.tar.zst &&
          tar xf mingw-w64-x86_64-curl-8.12.1-1-any.pkg.tar &&
          cp mingw64/bin/libcurl-4.dll "$GAMEDIR/game/XCurl.dll" &&
          rm -rf "$WORK"

    # Copy XCurl dependency DLLs from GDK-Proton
    - execute:
        command: >-
          for dll in libbrotlidec.dll libbrotlicommon.dll libidn2-0.dll libnghttp2-14.dll
          libnghttp3-9.dll libngtcp2-16.dll libngtcp2_crypto_ossl-0.dll libpsl-5.dll
          libssh2-1.dll libzstd.dll libcrypto-3-x64.dll libssl-3-x64.dll zlib1.dll; do
          cp "$GAMEDIR/GDK-Proton10-32/files/lib/wine/x86_64-windows/$dll" "$GAMEDIR/game/";
          done

    # Download SSL CA certificates (for HTTPS in-game)
    - execute:
        command: >-
          mkdir -p "$GAMEDIR/etc/ssl/certs" &&
          curl -sL -o "$GAMEDIR/etc/ssl/certs/ca-bundle.crt" "https://curl.se/ca/cacert.pem"

    # Copy xgameruntime DLLs from GDK-Proton to game directory
    - execute:
        command: >-
          cp "$GAMEDIR/GDK-Proton10-32/files/lib/wine/x86_64-windows/xgameruntime.dll" "$GAMEDIR/game/" &&
          cp "$GAMEDIR/GDK-Proton10-32/files/lib/wine/x86_64-windows/xgameruntime.dll.threading" "$GAMEDIR/game/"

    # Create Wine prefix and install GameInputRedist
    - execute:
        command: >-
          mkdir -p "$GAMEDIR/prefix/pfx" &&
          mkdir -p "$HOME/.steam/root" &&
          if [ -f "$GAMEDIR/game/Installers/GameInputRedist.msi" ]; then
          WINEPREFIX="$GAMEDIR/prefix/pfx"
          "$GAMEDIR/GDK-Proton10-32/files/bin/wine64"
          msiexec /i "$GAMEDIR/game/Installers/GameInputRedist.msi" /qn 2>/dev/null || true;
          fi

    # Generate launch script
    - write_file:
        file: $GAMEDIR/launch.sh
        content: |
          #!/usr/bin/env bash
          set -euo pipefail
          GAMEDIR="$(cd "$(dirname "$0")" && pwd)"
          # Required for non-Steam games — without UMU_ID/SteamGameId, Proton uses wrong launch path and silently exits
          export UMU_ID=umu-0
          export SteamGameId=0
          export PROTON_NO_NTSYNC=1
          export STEAM_COMPAT_DATA_PATH="$GAMEDIR/prefix"
          export STEAM_COMPAT_CLIENT_INSTALL_PATH="$HOME/.steam/root"
          export PROTONPATH="$GAMEDIR/GDK-Proton10-32"
          # Force Wine builtin D3D12/D3D11/DXGI instead of DXVK/vkd3d-proton.
          # bgfx (Minecraft's renderer) hits a vkd3d-proton memory aliasing bug
          # causing a black screen. Builtin DLLs route through wined3d->OpenGL.
          export PROTON_USE_BUILTIN3D=1
          # Force Wine to use GDK-Proton's builtin gameinputredist.dll instead of
          # Microsoft's redistributable, which crashes under Wine/Proton.
          export WINEDLLOVERRIDES="GameInputRedist=b"
          exec "$GAMEDIR/GDK-Proton10-32/proton" run "$GAMEDIR/game/Minecraft.Windows.exe"

    - chmodx: $GAMEDIR/launch.sh

  game:
    exe: launch.sh
    working_dir: $GAMEDIR

  system:
    env:
      UMU_ID: umu-0
      SteamGameId: "0"
      PROTON_NO_NTSYNC: "1"
      PROTON_USE_BUILTIN3D: "1"
      STEAM_COMPAT_DATA_PATH: $GAMEDIR/prefix
      STEAM_COMPAT_CLIENT_INSTALL_PATH: $HOME/.steam/root
      PROTONPATH: $GAMEDIR/GDK-Proton10-32
      WINEDLLOVERRIDES: GameInputRedist=b
      GAMEID: minecraft-bedrock
      STORE: none

  install_complete_text: >-
    Minecraft Bedrock has been installed! Launch it from Lutris.

    Note: This is an experimental setup with known limitations -
    no Microsoft account login, no Realms, and no featured servers.
    See the project README for workarounds.
