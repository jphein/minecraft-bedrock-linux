# dxvk.conf — Minecraft Bedrock 1.26.21, DXVK 2.7.1 (D3D11-only path)
# Host: GTX 1650 4 GB (nvidia 595.71.05), i7-3770 (4c/8t), 15.6 GiB RAM.
# Applied via DXVK_CONFIG_FILE in scripts/play-bedrock.sh. All keys verified
# present in the installed DXVK 2.7.1 (state cache + maxChunkSize were removed
# in 2.7; __GL_* and VKD3D_* are irrelevant here — see PERFORMANCE.md).

# Background pipeline compilation (modern replacement for the async fork / state
# cache); self-disables if the driver lacks VK_EXT_graphics_pipeline_library.
dxvk.enableGraphicsPipelineLibrary = Auto

# 8 logical threads; leave 2 free so background compiles don't starve the
# render/sim threads on this CPU-limited host.
dxvk.numCompilerThreads = 6

# Fewer queued frames = less input lag + less memory churn on a slow CPU.
dxgi.maxFrameLatency = 2

# Reclaim VRAM on a 4 GB card (Auto skips on blocked drivers; 595 is fine).
dxvk.enableMemoryDefrag = Auto

# Diagnostics (uncomment to verify GPU/GPL/VRAM, then re-comment):
# dxvk.hud = fps,frametimes,gpuload,memory,compiler

# Frame cap is handled in-game (gfx_max_framerate via apply-perf-options.sh);
# do NOT also enable this or you'll double-limit and get beat-frequency stutter.
# dxgi.maxFrameRate = 60
